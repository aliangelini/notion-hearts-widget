<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Hearts</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    background: transparent;
    display: flex;
    justify-content: center;
    align-items: center;
    overflow: hidden;
}

img {
    width: 100%;
    height: 100%;
    object-fit: contain;
}
</style>
</head>

<body>

<img id="heartImage" alt="Weekly Hearts">

<script>
const images = [
    "monday.png",
    "tuesday.png",
    "wednesday.png",
    "thursday.png",
    "friday.png",
    "saturday.png",
    "sunday.png"
];

// Monday = 0, Tuesday = 1, ..., Sunday = 6
const today = (new Date().getDay() + 6) % 7;

// Show today's image
document.getElementById("heartImage").src = images[today];
</script>

</body>
</html>
